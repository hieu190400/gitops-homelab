apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
  namespace: monitoring
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore

  target:
    name: grafana-admin

  data:
    - secretKey: grafana-user
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None	
        metadataPolicy: None	
        nullBytePolicy: Ignore
        key: grafana
        property: user

    - secretKey: grafana-password
      remoteRef:
        conversionStrategy: Default	
        decodingStrategy: None	
        metadataPolicy: None	
        nullBytePolicy: Ignore
        key: grafana
        property: password