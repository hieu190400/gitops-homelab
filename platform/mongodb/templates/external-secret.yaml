apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mongodb
  namespace: platform
spec:
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore

  target:
    name: mongodb-auth

  data:
    - secretKey: mongodb-passwords
      remoteRef:
        key: mongo
        property: passwords

    - secretKey: mongodb-root-password
      remoteRef:
        key: mongo
        property: root-password