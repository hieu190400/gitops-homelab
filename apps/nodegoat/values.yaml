replicaCount: 1

image:
  repository: registry.lab.internal/k8s-nodegoat
  tag: k8s-v0.0.2.4
  pullPolicy: IfNotPresent

container:
  port: 4000

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

service:
  port: 80
  name: nodegoat-service

route:
  host: nodegoat.lab.internal


dbInitJob:
  enabled: true