apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: nginx
spec:
  parentRefs:
    - name: web
      namespace: infra
      sectionName: web

  hostnames:
    - nginx.lab.local

  rules:
    - backendRefs:
        - name: {{ .Values.service.name }}
          port: {{ .Values.service.port }}