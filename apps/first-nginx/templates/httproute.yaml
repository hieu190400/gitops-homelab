apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: nginx
spec:
  parentRefs:
    - name: web
      namespace: gateway
      sectionName: web

  hostnames:
    - {{ .Values.route.host | quote }}

  rules:
    - backendRefs:
        - name: {{ .Values.service.name }}
          port: {{ .Values.service.port }}