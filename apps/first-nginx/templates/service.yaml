apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.service.name }}
  labels:
    {{- include "nginx.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "nginx.labels" . | nindent 4 }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.container.port }}