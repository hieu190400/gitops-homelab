apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: first-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/hieu190400/gitops-homelab
    targetRevision: main
    path: apps/first-nginx

    helm:
      releaseName: first-nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: demo

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true