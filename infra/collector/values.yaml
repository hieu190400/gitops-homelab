opentelemetry-collector:
  mode: daemonset

  service:
    enabled: true

  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  
  command:
    name: otelcol-k8s
  
  presets:
    logsCollection:
      enabled: true

    kubernetesAttributes:
      enabled: true
  
  resources:
    limits:
      cpu: 250m
      memory: 512Mi

  config:
    exporters:
      debug: {}

      otlphttp/loki:
        endpoint: http://loki:3100/otlp

      otlp/tempo:
        endpoint: tempo:4317
        tls:
          insecure: true

    service:
      pipelines:
        logs:
          exporters:
            - debug
            - otlphttp/loki
        
        traces:
          exporters:
            - debug
            - otlp/tempo

          processors:
            - memory_limiter
            - batch