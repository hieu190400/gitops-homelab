opentelemetry-collector:
  mode: daemonset

  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  
  command:
    name: otelcol-k8s
  
  presets:
    logsCollection:
      enabled: true

    kubernetesAttributes:
      enabled: true
  
  resources:
    limits:
      cpu: 250m
      memory: 512Mi