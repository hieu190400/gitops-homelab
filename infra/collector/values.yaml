opentelemetry-collector:
  mode: daemonset

  image:
    repository: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s
  
  command:
    name: otelcol-k8s
  
  presets:
    logsCollection:
      enabled: true

    kubernetesAttributes:
      enabled: true
  
  resources:
    limits:
      cpu: 250m
      memory: 512Mi

  config:
    exporters:
      debug: {}

      otlphttp/loki:
        endpoint: http://loki.observability.svc.cluster.local:3100/otlp

    service:
      pipelines:
        logs:
          exporters:
            - debug
            - otlphttp/loki