vault:
  route:
    enabled: true
    host: vault.lab.local

  injector: # use external injector
    enabled: false

  server:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    ha:
      enabled: true
      replicas: 3
      raft:
        enabled: true
        config: |
          ui = true

          listener "tcp" {
            tls_disable = 1
            address = "[::]:8200"
            cluster_address = "[::]:8201"
          }

          storage "raft" {
            path = "/vault/data"

            retry_join {
              leader_api_addr = "http://vault-0.vault-internal:8200"
            }
          }

          service_registration "kubernetes" {}

    dataStorage:
      enabled: true
      storageClass: longhorn-dev
      size: 512Mi
      accessMode: ReadWriteOnce

    ingress:
      enabled: false

    auditStorage: # disable audit storage for now, as it requires a separate storage class
      enabled: false

    standalone:
      enabled: false

    ui:
      enabled: true

    service:
      enabled: true


gateway:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: web
    namespace: infra
    sectionName: web