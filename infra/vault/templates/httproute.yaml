{{- if .Values.vault.route.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: vault
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway | nindent 4 }}

  hostnames:
    - {{ .Values.vault.route.host | quote }}

  rules:
    - backendRefs:
        - group: ''	
          kind: Service
          name: {{ printf "%s-vault" .Release.Name }}
          port: 8200
          weight: 1	
      matches:	
        - path:	
            type: PathPrefix	
            value: /
{{- end }}