apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: monitoring-app
  namespace: argocd

spec:
  project: default
  
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 87.3.0
      helm:
        releaseName: monitoring
        valueFiles:
          - $values/infra/monitoring/values.yaml

    - repoURL: https://github.com/hieu190400/gitops-homelab
      targetRevision: main
      ref: values
      

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

