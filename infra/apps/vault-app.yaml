apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: vault-app
  namespace: argocd

spec:
  project: default
  
  source:
    repoURL: https://github.com/hieu190400/gitops-homelab
    targetRevision: main
    path: infra/vault
    helm:
      releaseName: vault
      

  destination:
    server: https://kubernetes.default.svc
    namespace: vault

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true

