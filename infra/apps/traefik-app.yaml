apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: traefik-app
  namespace: argocd

spec:
  project: default
  source:
    repoURL: https://github.com/hieu190400/gitops-homelab
    targetRevision: main
    path: infra/traefik 

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system 
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true 