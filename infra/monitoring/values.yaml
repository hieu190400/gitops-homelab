grafana:
  enabled: true
  route:
    enabled: true
    host: grafana.lab.local
  grafana:
    persistence:
      enabled: true
      storageClassName: longhorn
      size: 1Gi

prometheus:
  prometheusSpec:
    retention: 1d
    retentionSize: 1500MB
  route:
    enabled: true
    host: prometheus.lab.local
  storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi

alertmanager:
  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 512Mi

gateway:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: web
    namespace: infra
    sectionName: web