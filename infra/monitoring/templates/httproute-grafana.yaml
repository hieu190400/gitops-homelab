{{- if .Values.route.grafana.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute

metadata:
  name: grafana
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway | nindent 4 }}

  hostnames:
    - {{ .Values.route.grafana.host | quote }}

  rules:
    - backendRefs:
        - group: ''	
          kind: Service
          name: {{ printf "%s-grafana" .Release.Name }}
          port: 80
          weight: 1	
      matches:	
        - path:	
            type: PathPrefix	
            value: /
{{- end }}