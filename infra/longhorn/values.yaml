longhorn:
  route:
    enabled: true
    host: longhorn.lab.local

  metrics:
    serviceMonitor:
      enabled: false

  defaultSettings:
    defaultReplicaCount: 1
    storageReservedPercentageForDefaultDisk: 60 
    storageMinimalAvailablePercentage: 10

  defaultBackupStore:
    backupTarget: s3://longhorn@ap-northeast-1/
    backupTargetCredentialSecret: minio-secret

  persistence:
    defaultClassReplicaCount: 1

  preUpgradeChecker:
    jobEnabled: false

  longhornManager:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi

gateway:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: web
    namespace: infra
    sectionName: web



