apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: external-secrets
  namespace: argocd

spec:
  project: security
  sources:
    - repoURL: https://charts.external-secrets.io
      chart: external-secrets
      targetRevision: 2.6.0
      helm:
        valueFiles:
          - $values/platform/security/external-secrets/values.yaml

    - repoURL: https://github.com/hieu190400/gitops-homelab
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: security

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true