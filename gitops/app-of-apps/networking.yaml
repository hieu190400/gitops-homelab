apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: networking
  namespace: argocd

spec:
  project: networking
  source:
    repoURL: https://github.com/hieu190400/gitops-homelab
    targetRevision: main
    path: gitops/applications/networking 

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true 